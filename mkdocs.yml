site_name: knowledge SDK
site_description: An open-source Python SDK for Open Knowledge Format (OKF) documents
repo_url: https://github.com/anomalyco/knowledge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Plugin Guide: plugin_guide.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: true
